<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heartbeat 3D Character Animation</title>
  <style>
    :root {
      --bg1: #090b1a;
      --bg2: #1f2242;
      --pink: #ff4d8d;
      --aqua: #7bf8ff;
      --skin: #f7c7b4;
      --hair: #2f1e2f;
      --dress: #8f7dff;
      --white: #ffffff;
      --shadow: rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at 20% 10%, #243065 0%, var(--bg1) 35%), linear-gradient(160deg, var(--bg2), var(--bg1));
      color: var(--white);
    }

    .scene {
      position: relative;
      width: min(95vw, 980px);
      height: min(86vh, 620px);
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
      box-shadow: 0 20px 80px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.08);
      perspective: 1000px;
    }

    .heartbeat {
      position: absolute;
      left: -5%; right: -5%;
      top: 50%;
      height: 170px;
      transform: translateY(-50%);
      filter: drop-shadow(0 0 12px rgba(255,77,141,.8));
      opacity: .9;
    }

    .heartbeat path {
      stroke: var(--pink);
      stroke-width: 5;
      fill: none;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-dasharray: 1700;
      stroke-dashoffset: 1700;
      animation: drawLine 5.2s linear infinite;
    }

    @keyframes drawLine {
      0% { stroke-dashoffset: 1700; }
      55% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -1700; }
    }

    .character-wrap {
      position: absolute;
      left: 50%;
      top: 56%;
      width: 230px;
      height: 390px;
      transform-style: preserve-3d;
      animation: moveCycle 12s ease-in-out infinite;
    }

    @keyframes moveCycle {
      0%, 14%   { transform: translate3d(-310px,-30px,60px) scale(0.95); }
      15%, 34%  { transform: translate3d(-120px,0,0) scale(1.00); }
      35%, 56%  { transform: translate3d(45px,-8px,30px) scale(1.06); }
      57%, 78%  { transform: translate3d(210px,-12px,90px) scale(1.15); }
      79%, 100% { transform: translate3d(-310px,-30px,60px) scale(0.95); }
    }

    .character {
      position: absolute;
      left: 50%; top: 50%;
      width: 150px;
      height: 320px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%) rotateY(-12deg);
      animation: modePose 12s linear infinite;
    }

    @keyframes modePose {
      0%, 14%   { transform: translate(-50%, -50%) rotateY(-25deg) rotateX(5deg); }
      15%, 34%  { transform: translate(-50%, -50%) rotateY(-10deg) rotateX(0); }
      35%, 56%  { transform: translate(-50%, -50%) rotateY(0deg) rotateX(-2deg); }
      57%, 78%  { transform: translate(-50%, -50%) rotateY(12deg) rotateX(-6deg); }
      79%, 100% { transform: translate(-50%, -50%) rotateY(-25deg) rotateX(5deg); }
    }

    .head {
      position: absolute;
      left: 50%; top: 20px;
      width: 86px; height: 94px;
      transform: translateX(-50%);
      background: var(--skin);
      border-radius: 45% 45% 48% 48%;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,.06);
    }

    .hair {
      position: absolute;
      inset: -10px -6px 28px;
      background: var(--hair);
      border-radius: 50% 50% 42% 42%;
      z-index: -1;
    }

    .eye { position:absolute; top:42px; width:16px; height:10px; border-radius:50%; background:#2f2f2f; }
    .eye.left { left:20px; }
    .eye.right{ right:20px; }

    .brow { position:absolute; top:30px; width:20px; height:3px; background:#4a3248; border-radius:2px; }
    .brow.left { left:17px; transform: rotate(8deg); }
    .brow.right{ right:17px; transform: rotate(-8deg); }

    .mouth {
      position:absolute;
      left:50%; bottom:20px;
      width:22px; height:10px;
      transform:translateX(-50%);
      border:3px solid #cc5c6f;
      border-top:0;
      border-left-color: transparent;
      border-right-color: transparent;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      animation: faceCycle 12s steps(1) infinite;
    }

    @keyframes faceCycle {
      0%, 20%   { width: 20px; height: 8px; border-width: 2px; }
      21%, 45%  { width: 18px; height: 5px; border-radius: 0 0 14px 14px; }
      46%, 70%  { width: 24px; height: 12px; border-width: 3px; }
      71%, 100% { width: 14px; height: 14px; border: 3px solid #cc5c6f; border-radius: 50%; border-left-color:#cc5c6f; border-top-color:#cc5c6f; }
    }

    .body {
      position: absolute;
      left: 50%; top: 98px;
      width: 88px; height: 118px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #ab9bff, #7f6df8);
      border-radius: 42px 42px 22px 22px;
      box-shadow: inset 0 -10px 0 rgba(0,0,0,.1);
      animation: bounce 1s ease-in-out infinite;
    }

    .arm, .leg {
      position: absolute;
      background: var(--skin);
      transform-origin: top center;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,.08);
    }

    .arm {
      top: 112px;
      width: 16px; height: 86px;
      border-radius: 18px;
      animation: armMove 1s ease-in-out infinite;
    }
    .arm.left  { left: 38px; }
    .arm.right { right: 38px; animation-delay: -.5s; }

    .leg {
      top: 202px;
      width: 20px; height: 108px;
      border-radius: 16px;
      animation: legMove 1s ease-in-out infinite;
    }
    .leg.left  { left: 57px; }
    .leg.right { right: 57px; animation-delay: -.5s; }

    .shoe {
      position: absolute;
      width: 34px; height: 14px;
      background: var(--white);
      border-radius: 12px;
      bottom: -6px; left: -7px;
      box-shadow: 0 3px 0 rgba(0,0,0,.18);
    }

    .shadow {
      position: absolute;
      left: 50%;
      bottom: 38px;
      width: 110px; height: 22px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(0,0,0,.35), rgba(0,0,0,0));
      animation: shadowPulse 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-18px); }
    }

    @keyframes armMove {
      0%,100%{ transform: rotate(34deg); }
      50%{ transform: rotate(-36deg); }
    }
    @keyframes legMove {
      0%,100%{ transform: rotate(-34deg); }
      50%{ transform: rotate(30deg); }
    }
    @keyframes shadowPulse {
      0%,100%{ transform: translateX(-50%) scale(1); opacity:.36; }
      50%{ transform: translateX(-50%) scale(.72); opacity:.2; }
    }

    .label {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      font-weight: 600;
      letter-spacing: .3px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
      animation: labelCycle 12s steps(1) infinite;
    }

    @keyframes labelCycle {
      0%,14%   { content: 'Jumping'; }
      15%,34%  { content: 'Walking'; }
      35%,56%  { content: 'Jogging'; }
      57%,78%  { content: 'Running'; }
      79%,100% { content: 'Jumping'; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="label" id="modeText">Jumping</div>
    <svg class="heartbeat" viewBox="0 0 1600 200" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0 100 L170 100 L220 95 L260 130 L320 40 L380 165 L470 100 L620 100 L670 95 L710 130 L770 40 L830 165 L920 100 L1080 100 L1130 95 L1170 130 L1230 40 L1290 165 L1390 100 L1600 100" />
    </svg>

    <div class="character-wrap">
      <div class="shadow"></div>
      <div class="character">
        <div class="head">
          <div class="hair"></div>
          <div class="brow left"></div>
          <div class="brow right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
        <div class="body"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="leg left"><div class="shoe"></div></div>
        <div class="leg right"><div class="shoe"></div></div>
      </div>
    </div>
  </div>

  <script>
    const modeText = document.getElementById('modeText');
    const states = [
      { name: 'Jumping', start: 0, end: 14 },
      { name: 'Walking', start: 15, end: 34 },
      { name: 'Jogging', start: 35, end: 56 },
      { name: 'Running', start: 57, end: 78 },
      { name: 'Jumping', start: 79, end: 100 }
    ];

    const duration = 12000;
    const startTime = performance.now();

    function tick(now) {
      const elapsed = (now - startTime) % duration;
      const pct = (elapsed / duration) * 100;
      const current = states.find(s => pct >= s.start && pct <= s.end) || states[0];
      modeText.textContent = `${current.name} · Expressive face`;
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
